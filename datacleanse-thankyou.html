<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You | DataCleanse - ZEUSTECH</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Manrope', sans-serif;
      background: #0a0704;
      color: #e9e2d4;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .checkmark {
      font-size: 5rem;
      color: #D4AF37;
      margin-bottom: 20px;
    }
    
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      color: #D4AF37;
      margin-bottom: 20px;
    }
    
    p {
      color: #b4a68f;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }
    
    .btn {
      display: inline-block;
      background: transparent;
      border: 2px solid #D4AF37;
      color: #D4AF37;
      padding: 12px 30px;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.85rem;
      transition: all 0.3s ease;
      margin: 5px;
    }
    
    .btn:hover {
      background: #D4AF37;
      color: #0a0704;
    }
    
    .footer {
      margin-top: 50px;
      font-size: 0.8rem;
      color: #6a5a4a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">
      <i class="fas fa-check-circle"></i>
    </div>
    <h1>Thank You!</h1>
    <p>We have received your request and will respond within 24 hours.</p>
    <p style="font-size: 0.95rem;">📞 In the meantime, feel free to call us at <strong>079 628 8382</strong></p>
    <div>
      <a href="/#datacleanse" class="btn">← Back to DataCleanse</a>
      <a href="/" class="btn">Home</a>
    </div>
    <div class="footer">
      <p>© 2025 ZeusTech (Pty) Ltd</p>
    </div>
  </div>
</body>
</html>
